<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마인드맵 | Obsidian Style</title>
  <meta name="description" content="옵시디언 스타일의 인터랙티브 마인드맵. 학습 내용을 시각적으로 정리하세요.">

  <!-- 🎨 스타일시트 -->
  <link rel="stylesheet" href="index.css">

  <!-- 🔤 Google Material Symbols (구글 아이콘) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>

<body>
  <!-- ===================================================
       📦 전체 앱 컨테이너
       CSS Grid로 header / sidebar / canvas 3영역 분할
       =================================================== -->
  <div id="app-container">

    <!-- ===================================================
         📌 상단 헤더: 학번, 이름, 과목 입력
         집의 지붕 같은 역할! 항상 맨 위에 고정
         =================================================== -->
    <header class="app-header" id="app-header">
      <!-- 로고 -->
      <div class="header-logo">
        <span class="material-symbols-rounded">hub</span>
        <span>MindMap</span>
      </div>

      <div class="header-divider"></div>

      <!-- 학번 / 이름 / 과목 입력 필드 -->
      <div class="header-inputs">
        <div class="input-group">
          <label for="input-student-id">학번</label>
          <input type="text" id="input-student-id" placeholder="예: 20101">
        </div>
        <div class="input-group">
          <label for="input-student-name">이름</label>
          <input type="text" id="input-student-name" placeholder="예: 홍길동">
        </div>
        <div class="input-group">
          <label for="input-subject">과목</label>
          <input type="text" id="input-subject" placeholder="예: 수학Ⅱ">
        </div>
      </div>

      <!-- 오른쪽 액션 버튼 -->
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-export" title="이미지로 내보내기">
          <span class="material-symbols-rounded">download</span>
          내보내기
        </button>
        <button class="btn btn-secondary" id="btn-reset" title="전체 초기화">
          <span class="material-symbols-rounded">restart_alt</span>
        </button>
      </div>
    </header>

    <!-- ===================================================
         📂 좌측 사이드바: 노드 관리 패널
         옵시디언의 파일 탐색기처럼 생겼어요!
         =================================================== -->
    <aside class="app-sidebar" id="app-sidebar">

      <!-- 섹션 1: 노드 추가 폼 -->
      <div class="sidebar-section">
        <div class="section-title">
          <span class="material-symbols-rounded">add_circle</span>
          노드 추가
        </div>
        <form class="add-node-form" id="add-node-form">
          <!-- 노드 이름 입력 -->
          <input type="text" id="input-node-name" placeholder="노드 이름을 입력하세요" required>

          <!-- 부모 노드 선택 (어떤 노드의 자식으로 달 건지) -->
          <select id="select-parent-node">
            <option value="root">루트 (최상위)</option>
            <!-- app.js에서 동적으로 옵션 추가 -->
          </select>

          <!-- 색상 선택 -->
          <div class="color-picker-group" id="color-picker">
            <div class="color-swatch active" data-color="#a855f7" style="background: #a855f7;" title="보라"></div>
            <div class="color-swatch" data-color="#3b82f6" style="background: #3b82f6;" title="파랑"></div>
            <div class="color-swatch" data-color="#06b6d4" style="background: #06b6d4;" title="시안"></div>
            <div class="color-swatch" data-color="#10b981" style="background: #10b981;" title="초록"></div>
            <div class="color-swatch" data-color="#f59e0b" style="background: #f59e0b;" title="노랑"></div>
            <div class="color-swatch" data-color="#ec4899" style="background: #ec4899;" title="핑크"></div>
            <div class="color-swatch" data-color="#ef4444" style="background: #ef4444;" title="빨강"></div>
            <div class="color-swatch" data-color="#8b5cf6" style="background: #8b5cf6;" title="인디고"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="btn-add-node">
            <span class="material-symbols-rounded">add</span>
            노드 추가
          </button>
        </form>
      </div>

      <!-- 섹션 2: 선택된 노드 편집 -->
      <div class="edit-panel" id="edit-panel">
        <div class="section-title">
          <span class="material-symbols-rounded">edit</span>
          노드 편집
        </div>

        <div>
          <div class="edit-label">노드 이름</div>
          <input type="text" id="edit-node-name" placeholder="이름 수정">
        </div>

        <div>
          <div class="edit-label">색상 변경</div>
          <div class="color-picker-group" id="edit-color-picker">
            <div class="color-swatch" data-color="#a855f7" style="background: #a855f7;"></div>
            <div class="color-swatch" data-color="#3b82f6" style="background: #3b82f6;"></div>
            <div class="color-swatch" data-color="#06b6d4" style="background: #06b6d4;"></div>
            <div class="color-swatch" data-color="#10b981" style="background: #10b981;"></div>
            <div class="color-swatch" data-color="#f59e0b" style="background: #f59e0b;"></div>
            <div class="color-swatch" data-color="#ec4899" style="background: #ec4899;"></div>
            <div class="color-swatch" data-color="#ef4444" style="background: #ef4444;"></div>
            <div class="color-swatch" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-secondary" id="btn-edit-save" style="flex:1;">
            <span class="material-symbols-rounded">check</span>
            저장
          </button>
          <button class="btn btn-danger" id="btn-delete-node">
            <span class="material-symbols-rounded">delete</span>
            삭제
          </button>
        </div>
      </div>

      <!-- 섹션 3: 노드 트리 목록 -->
      <div class="sidebar-section">
        <div class="section-title">
          <span class="material-symbols-rounded">account_tree</span>
          노드 목록
        </div>

        <!-- 노드가 없을 때 보여줄 빈 상태 메시지 -->
        <div class="empty-state" id="empty-state">
          <span class="material-symbols-rounded">psychiatry</span>
          <p>아직 노드가 없어요!<br>위에서 첫 번째 노드를 추가해보세요 🌱</p>
        </div>

        <!-- 노드 트리 리스트 (app.js에서 동적 생성) -->
        <ul class="node-tree" id="node-tree-list">
          <!-- 여기에 동적으로 노드 항목 추가됨 -->
        </ul>
      </div>
    </aside>

    <!-- ===================================================
         🎨 메인 캔버스: 마인드맵 그리는 영역
         수학의 좌표평면처럼, 여기가 메인 무대!
         =================================================== -->
    <main class="app-canvas-wrapper" id="canvas-wrapper">
      <!-- Canvas 엘리먼트 (JavaScript에서 그림 그릴 도화지) -->
      <canvas id="mindmap-canvas"></canvas>

      <!-- 줌 인/아웃 컨트롤 -->
      <div class="canvas-controls">
        <button class="btn-icon" id="btn-zoom-in" title="확대">
          <span class="material-symbols-rounded">add</span>
        </button>
        <button class="btn-icon" id="btn-zoom-out" title="축소">
          <span class="material-symbols-rounded">remove</span>
        </button>
        <button class="btn-icon" id="btn-zoom-fit" title="전체 보기">
          <span class="material-symbols-rounded">fit_screen</span>
        </button>
      </div>

      <!-- 하단 조작 도움말 -->
      <div class="canvas-help">
        <div class="help-item">
          <kbd>드래그</kbd> 노드 이동
        </div>
        <div class="help-item">
          <kbd>빈곳 드래그</kbd> 화면 이동
        </div>
        <div class="help-item">
          <kbd>스크롤</kbd> 확대/축소
        </div>
        <div class="help-item">
          <kbd>클릭</kbd> 노드 선택
        </div>
        <div class="help-item">
          <kbd>더블클릭</kbd> 이름 편집
        </div>
      </div>
    </main>

  </div>

  <!-- 📜 메인 JavaScript -->
  <script src="app.js"></script>
</body>
</html>
